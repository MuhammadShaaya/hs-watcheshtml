<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wishlist — H&amp;S Watches</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="shop">

<nav class="nav" id="site-nav"></nav>

<section class="section">
  <div class="container">
    <span class="eyebrow">Saved for later</span>
    <h2 style="margin:14px 0 34px;">Your wishlist</h2>
    <div class="grid" id="wishGrid"><p class="text-dim">Loading…</p></div>
  </div>
</section>

<footer class="footer" id="site-footer"></footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
(async function(){
  const grid = document.getElementById("wishGrid");
  let products = [];
  try { products = await getAllProducts(); }
  catch (e) { grid.innerHTML = `<p class="text-dim">Couldn't load products. (${e.message})</p>`; return; }

  function render() {
    const ids = getWishlist();
    const list = products.filter(p => ids.includes(p.id));
    grid.innerHTML = list.length ? list.map(productCard).join("") : `
      <div class="empty" style="grid-column:1/-1;">
        <h3>No favourites yet</h3>
        <p>Tap the heart on any watch to save it here.</p>
        <a href="shop.html" class="btn btn-gold" style="margin-top:16px;">Browse the collection</a>
      </div>`;
    bindCardEvents(grid, products);
    grid.querySelectorAll("[data-wish]").forEach(btn => {
      btn.addEventListener("click", () => setTimeout(render, 50));
    });
  }
  render();
})();
</script>
</body>
</html>

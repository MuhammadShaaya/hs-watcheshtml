<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop — H&amp;S Watches</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="shop">

<nav class="nav" id="site-nav"></nav>

<header class="section" style="padding-bottom:0;">
  <div class="container">
    <span class="eyebrow">The full collection</span>
    <h2 style="margin:14px 0 30px; font-size:clamp(28px,3.4vw,40px);">Shop all timepieces</h2>
  </div>
</header>

<section class="section" style="padding-top:26px;">
  <div class="container">
    <div class="filters-bar">
      <input type="search" id="searchInput" placeholder="Search by name…">
      <select id="categoryFilter"><option value="">All categories</option></select>
      <select id="sortFilter">
        <option value="default">Sort: Featured</option>
        <option value="price-asc">Price: Low to High</option>
        <option value="price-desc">Price: High to Low</option>
        <option value="rating-desc">Rating: High to Low</option>
        <option value="name-asc">Name: A–Z</option>
      </select>
      <span class="result-count" id="resultCount"></span>
    </div>
    <div class="grid" id="shopGrid">
      <p class="text-dim">Loading watches…</p>
    </div>
  </div>
</section>

<footer class="footer" id="site-footer"></footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
(async function(){
  const grid = document.getElementById("shopGrid");
  const searchInput = document.getElementById("searchInput");
  const categoryFilter = document.getElementById("categoryFilter");
  const sortFilter = document.getElementById("sortFilter");
  const resultCount = document.getElementById("resultCount");

  let products = [];
  try {
    products = await getAllProducts();
  } catch (e) {
    grid.innerHTML = `<p class="text-dim">Couldn't load products. Is the backend running? (${e.message})</p>`;
    return;
  }

  const categories = [...new Set(products.map(p => p.category))].sort();
  categoryFilter.innerHTML += categories.map(c => `<option value="${c}">${c}</option>`).join("");

  const params = new URLSearchParams(location.search);
  if (params.get("featured") === "1") { /* handled in filter below */ }
  if (params.get("category")) categoryFilter.value = params.get("category");

  function render() {
    const q = searchInput.value.trim().toLowerCase();
    const cat = categoryFilter.value;
    const sort = sortFilter.value;
    const onlyFeatured = params.get("featured") === "1";

    let list = products.filter(p => {
      const matchesQ = !q || p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q);
      const matchesCat = !cat || p.category === cat;
      const matchesFeatured = !onlyFeatured || p.featured;
      return matchesQ && matchesCat && matchesFeatured;
    });

    if (sort === "price-asc") list.sort((a,b) => a.price - b.price);
    else if (sort === "price-desc") list.sort((a,b) => b.price - a.price);
    else if (sort === "rating-desc") list.sort((a,b) => (b.rating||0) - (a.rating||0));
    else if (sort === "name-asc") list.sort((a,b) => a.name.localeCompare(b.name));
    else list.sort((a,b) => (b.featured===true) - (a.featured===true));

    resultCount.textContent = `${list.length} watch${list.length===1?"":"es"}`;
    grid.innerHTML = list.length ? list.map(productCard).join("") : `
      <div class="empty" style="grid-column:1/-1;">
        <h3>No watches match</h3>
        <p>Try clearing your search or filters.</p>
      </div>`;
    bindCardEvents(grid, products);
  }

  searchInput.addEventListener("input", render);
  categoryFilter.addEventListener("change", render);
  sortFilter.addEventListener("change", render);
  render();
})();
</script>
</body>
</html>

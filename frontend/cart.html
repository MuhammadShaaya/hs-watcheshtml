<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Cart — H&amp;S Watches</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .cart-wrap{ display:grid; grid-template-columns:2fr 1fr; gap:40px; align-items:start; }
  @media (max-width:900px){ .cart-wrap{ grid-template-columns:1fr; } }
  .cart-line{ display:grid; grid-template-columns:80px 1fr auto auto; gap:18px; align-items:center; padding:18px 0; border-bottom:1px solid var(--line); }
  .cart-line img{ width:80px; height:80px; object-fit:cover; border-radius:10px; }
  .cart-line .qty-box{ display:flex; align-items:center; border:1px solid var(--line); border-radius:10px; width:fit-content; }
  .cart-line .qty-box button{ background:none; border:none; color:var(--ivory); width:32px; height:36px; }
  .cart-line .qty-box input{ width:34px; text-align:center; background:none; border:none; color:var(--ivory); }
  .summary-card{ background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius-lg); padding:26px; position:sticky; top:100px; }
  .summary-row{ display:flex; justify-content:space-between; font-size:14px; color:var(--ivory-dim); margin-bottom:12px; }
  .summary-row.total{ color:var(--ivory); font-weight:700; font-size:17px; border-top:1px solid var(--line); padding-top:14px; margin-top:6px; }
</style>
</head>
<body data-page="shop">

<nav class="nav" id="site-nav"></nav>

<section class="section">
  <div class="container">
    <span class="eyebrow">Step 1 of 2</span>
    <h2 style="margin:14px 0 34px;">Your cart</h2>
    <div class="cart-wrap">
      <div id="cartLines"></div>
      <div class="summary-card">
        <h3 style="font-size:16px; margin-bottom:20px;">Order summary</h3>
        <div class="summary-row"><span>Subtotal</span><span id="sumSubtotal">Rs. 0</span></div>
        <div class="summary-row"><span>Delivery</span><span>Calculated at checkout</span></div>
        <div class="summary-row total"><span>Total</span><span id="sumTotal">Rs. 0</span></div>
        <a href="checkout.html" class="btn btn-gold btn-block" id="checkoutBtn" style="margin-top:18px;">Proceed to checkout</a>
        <a href="shop.html" class="btn btn-ghost btn-block" style="margin-top:8px;">Continue shopping</a>
      </div>
    </div>
  </div>
</section>

<footer class="footer" id="site-footer"></footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
function renderCartPage() {
  const lines = document.getElementById("cartLines");
  const cart = getCart();
  if (!cart.length) {
    lines.innerHTML = `<div class="empty">
      <h3>Your cart is empty</h3>
      <p>Browse the collection to find a watch worth keeping time with.</p>
      <a href="shop.html" class="btn btn-gold" style="margin-top:16px;">Shop the collection</a>
    </div>`;
    document.getElementById("checkoutBtn").setAttribute("aria-disabled", "true");
    document.getElementById("checkoutBtn").style.pointerEvents = "none";
    document.getElementById("checkoutBtn").style.opacity = ".5";
  } else {
    lines.innerHTML = cart.map(i => `
      <div class="cart-line">
        <img src="${i.image}" alt="${i.name}">
        <div>
          <div style="font-family:var(--font-display); font-size:15px;">${i.name}</div>
          <div class="text-dim" style="font-size:13px; margin-top:4px;">${formatPrice(i.price)} each</div>
        </div>
        <div class="qty-box">
          <button type="button" data-down="${i.id}">−</button>
          <input type="text" readonly value="${i.qty}">
          <button type="button" data-up="${i.id}">+</button>
        </div>
        <div style="text-align:right;">
          <div style="font-weight:700; margin-bottom:8px;">${formatPrice(i.price * i.qty)}</div>
          <button class="btn btn-ghost" data-remove="${i.id}" style="padding:4px 0; font-size:12px; color:var(--danger);">Remove</button>
        </div>
      </div>
    `).join("");
    lines.querySelectorAll("[data-up]").forEach(b => b.onclick = () => { const it = cart.find(c=>c.id==b.dataset.up); updateCartQty(it.id, it.qty+1); renderCartPage(); });
    lines.querySelectorAll("[data-down]").forEach(b => b.onclick = () => { const it = cart.find(c=>c.id==b.dataset.down); updateCartQty(it.id, it.qty-1); renderCartPage(); });
    lines.querySelectorAll("[data-remove]").forEach(b => b.onclick = () => { removeFromCart(Number(b.dataset.remove)); renderCartPage(); });
  }
  document.getElementById("sumSubtotal").textContent = formatPrice(cartTotal());
  document.getElementById("sumTotal").textContent = formatPrice(cartTotal());
}
document.addEventListener("DOMContentLoaded", renderCartPage);
</script>
</body>
</html>

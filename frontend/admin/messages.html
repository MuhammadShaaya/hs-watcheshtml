<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Messages — H&amp;S Admin</title>
<link rel="stylesheet" href="../css/style.css">
<link rel="stylesheet" href="admin.css">
</head>
<body data-admin-page="messages">
<div class="admin-shell">
  <aside class="admin-sidebar" id="adminSidebar"></aside>
  <main class="admin-main">
    <div class="admin-topbar"><h1 id="pageTitle">Messages</h1></div>
    <div class="admin-table-wrap">
      <table class="admin-table">
        <thead><tr><th>Status</th><th>Name</th><th>Email</th><th>Subject</th><th>Received</th><th>Actions</th></tr></thead>
        <tbody id="messagesBody"><tr><td colspan="6" class="text-dim">Loading…</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h3>Message</h3>
    <div id="msgDetail"></div>
    <div class="modal-actions"><button type="button" class="btn btn-outline" id="closeDetailBtn">Close</button></div>
  </div>
</div>

<script src="../js/config.js"></script>
<script src="admin.js"></script>
<script>
requireAdminAuth();
renderAdminShell("messages", "Messages");

let messages = [];

async function loadMessages() {
  const tbody = document.getElementById("messagesBody");
  try {
    messages = await adminFetch("/api/admin/messages");
    tbody.innerHTML = messages.length ? messages.map(m => `
      <tr>
        <td><span class="pill ${m.read ? 'pill-read' : 'pill-unread'}">${m.read ? "Read" : "New"}</span></td>
        <td>${m.name}</td>
        <td>${m.email}</td>
        <td>${m.subject}</td>
        <td class="text-dim">${new Date(m.createdAt).toLocaleDateString()}</td>
        <td>
          <div class="row-actions">
            <button data-view="${m.id}">View</button>
            <button class="danger" data-delete="${m.id}">Delete</button>
          </div>
        </td>
      </tr>
    `).join("") : `<tr><td colspan="6" class="text-dim">No messages yet.</td></tr>`;

    tbody.querySelectorAll("[data-view]").forEach(b => b.onclick = () => viewMessage(Number(b.dataset.view)));
    tbody.querySelectorAll("[data-delete]").forEach(b => b.onclick = async () => {
      if (!confirm("Delete this message?")) return;
      try { await adminFetch(`/api/admin/messages/${b.dataset.delete}`, { method: "DELETE" }); loadMessages(); }
      catch (e) { alert(e.message); }
    });
  } catch (e) {
    tbody.innerHTML = `<tr><td colspan="6" class="text-dim">${e.message}</td></tr>`;
  }
}

async function viewMessage(id) {
  const m = messages.find(x => x.id === id);
  if (!m) return;
  document.getElementById("msgDetail").innerHTML = `
    <p><strong>From:</strong> ${m.name} · ${m.email}</p>
    <p><strong>Subject:</strong> ${m.subject}</p>
    <p style="margin-top:12px; color:var(--ivory-dim); font-size:14px; line-height:1.7;">${m.message}</p>
  `;
  document.getElementById("modalOverlay").classList.add("show");
  if (!m.read) {
    try { await adminFetch(`/api/admin/messages/${id}`, { method: "PUT", body: JSON.stringify({ read: true }) }); loadMessages(); }
    catch {}
  }
}
document.getElementById("closeDetailBtn").onclick = () => document.getElementById("modalOverlay").classList.remove("show");

loadMessages();
</script>
</body>
</html>

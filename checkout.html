<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — H&amp;S Watches</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .co-wrap{ display:grid; grid-template-columns:1.3fr 1fr; gap:40px; align-items:start; }
  @media (max-width:900px){ .co-wrap{ grid-template-columns:1fr; } }
  .summary-card{ background:var(--bg-card); border:1px solid var(--line); border-radius:var(--radius-lg); padding:26px; position:sticky; top:100px; }
  .mini-line{ display:flex; justify-content:space-between; font-size:13px; color:var(--ivory-dim); padding:10px 0; border-bottom:1px dashed var(--line); }
  .summary-row.total{ display:flex; justify-content:space-between; color:var(--ivory); font-weight:700; font-size:17px; padding-top:14px; margin-top:6px; }
  .cod-note{ background:rgba(201,162,75,.08); border:1px solid var(--gold-dim); border-radius:10px; padding:14px 16px; font-size:13px; color:var(--gold-light); margin-bottom:22px; }
</style>
</head>
<body data-page="shop">

<nav class="nav" id="site-nav"></nav>

<section class="section">
  <div class="container">
    <span class="eyebrow">Step 2 of 2</span>
    <h2 style="margin:14px 0 34px;">Checkout</h2>

    <div id="emptyState" class="empty" style="display:none;">
      <h3>Nothing to check out</h3>
      <p>Your cart is empty. <a href="shop.html" style="color:var(--gold-light);">Go pick a watch →</a></p>
    </div>

    <div class="co-wrap" id="checkoutForm">
      <form id="orderForm">
        <div class="cod-note">Payment method: <strong>Cash on Delivery</strong>. Pay the courier when your order arrives — no card or bank details needed.</div>
        <div id="formMsg" class="form-msg"></div>

        <div class="field"><label>Full name</label><input type="text" id="fullName" required></div>
        <div class="field-row">
          <div class="field"><label>Phone number</label><input type="tel" id="phone" required></div>
          <div class="field"><label>Email (optional)</label><input type="email" id="email"></div>
        </div>
        <div class="field"><label>Delivery address</label><textarea id="address" required placeholder="House / street, area, landmark"></textarea></div>
        <div class="field-row">
          <div class="field"><label>City</label><input type="text" id="city" required></div>
          <div class="field"><label>Postal code (optional)</label><input type="text" id="postal"></div>
        </div>
        <div class="field"><label>Order notes (optional)</label><textarea id="notes" placeholder="Delivery instructions, gift note, etc."></textarea></div>
        <button type="submit" class="btn btn-gold btn-block" id="placeOrderBtn">Place order — Cash on Delivery</button>
      </form>

      <div class="summary-card">
        <h3 style="font-size:16px; margin-bottom:16px;">Order summary</h3>
        <div id="miniLines"></div>
        <div class="summary-row total"><span>Total</span><span id="coTotal">Rs. 0</span></div>
      </div>
    </div>
  </div>
</section>

<footer class="footer" id="site-footer"></footer>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/cart.js"></script>
<script src="js/main.js"></script>
<script>
(function(){
  const cart = getCart();
  if (!cart.length) {
    document.getElementById("emptyState").style.display = "block";
    document.getElementById("checkoutForm").style.display = "none";
    return;
  }
  document.getElementById("miniLines").innerHTML = cart.map(i => `
    <div class="mini-line"><span>${i.name} × ${i.qty}</span><span>${formatPrice(i.price*i.qty)}</span></div>
  `).join("");
  document.getElementById("coTotal").textContent = formatPrice(cartTotal());

  document.getElementById("orderForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const msg = document.getElementById("formMsg");
    const btn = document.getElementById("placeOrderBtn");
    const order = {
      customer: {
        name: document.getElementById("fullName").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        email: document.getElementById("email").value.trim(),
      },
      address: {
        line: document.getElementById("address").value.trim(),
        city: document.getElementById("city").value.trim(),
        postal: document.getElementById("postal").value.trim(),
      },
      notes: document.getElementById("notes").value.trim(),
      items: cart,
      total: cartTotal(),
      paymentMethod: "Cash on Delivery",
    };
    btn.disabled = true;
    btn.textContent = "Placing order…";
    try {
      const saved = await apiPost("/api/orders", order);
      clearCart();
      msg.className = "form-msg ok show";
      msg.textContent = `Order #${saved.id} placed! We'll call you at ${order.customer.phone} to confirm delivery.`;
      document.getElementById("orderForm").reset();
      document.getElementById("orderForm").querySelectorAll("input,textarea,button").forEach(el => el.disabled = true);
      btn.textContent = "Order placed";
    } catch (err) {
      msg.className = "form-msg err show";
      msg.textContent = `Couldn't place order: ${err.message}. Is the backend running?`;
      btn.disabled = false;
      btn.textContent = "Place order — Cash on Delivery";
    }
  });
})();
</script>
</body>
</html>
